apiVersion: v1
kind: ConfigMap
metadata:
  name: daykeeper-api-config
  namespace: daykeeper
  labels:
    app.kubernetes.io/name: daykeeper-api
    app.kubernetes.io/component: api
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  AttachmentStorage__BasePath: "/data/attachments"
  AttachmentStorage__MaxFileSizeBytes: "10485760"
  Firebase__ProjectId: "day-keeper-dev"
  GOOGLE_APPLICATION_CREDENTIALS: "/etc/firebase/credentials.json"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "daykeeper-api"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=dev"
  Serilog__WriteTo__1__Args__Endpoint: "http://otel-collector.observability.svc.cluster.local:4317"
