apiVersion: v1
kind: Secret
metadata:
  name: daykeeper-api-secrets
  namespace: daykeeper
  labels:
    app.kubernetes.io/name: daykeeper-api
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # yamllint disable-line rule:line-length
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=daykeeper;Username=daykeeper;Password=CHANGE_ME"
  firebase-credentials.json: |
    {
      "type": "service_account",
      "project_id": "CHANGE_ME",
      "private_key_id": "CHANGE_ME",
      "private_key": "CHANGE_ME",
      "client_email": "CHANGE_ME",
      "client_id": "CHANGE_ME",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: daykeeper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_DB: "daykeeper"
  POSTGRES_USER: "daykeeper"
  POSTGRES_PASSWORD: "CHANGE_ME"
