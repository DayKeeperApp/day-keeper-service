apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: daykeeper
  labels:
    app.kubernetes.io/name: postgres-backup
    app.kubernetes.io/component: database
spec:
  schedule: "0 2 * * *"
  startingDeadlineSeconds: 172800
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgres-backup
          annotations:
            # postgres-alpine image runs as UID 70 (hardcoded)
            kube-score/ignore: container-security-context-user-group-id
        spec:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            fsGroup: 70
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          initContainers:
            - name: init-permissions
              image: postgres:18-alpine
              imagePullPolicy: Always
              command: ["chown", "70:70", "/backups"]
              securityContext:
                runAsUser: 0
                runAsNonRoot: false
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                  add: ["CHOWN"]
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                  ephemeral-storage: 8Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
                  ephemeral-storage: 16Mi
              volumeMounts:
                - name: backups
                  mountPath: /backups
          containers:
            - name: pg-backup
              image: postgres:18-alpine
              imagePullPolicy: Always
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  BACKUP_DIR=/backups
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/daykeeper_${TIMESTAMP}.dump"

                  echo "Starting backup: ${BACKUP_FILE}"
                  pg_dump -Fc \
                    -h postgres \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    > "$BACKUP_FILE"
                  echo "Backup complete: $(du -h "$BACKUP_FILE" | cut -f1)"

                  echo "Removing backups older than 7 days..."
                  find "$BACKUP_DIR" -name "daykeeper_*.dump" -mtime +7 -delete

                  echo "Current backups:"
                  ls -lh "$BACKUP_DIR"/daykeeper_*.dump
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_DB
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                  ephemeral-storage: 32Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
                  ephemeral-storage: 128Mi
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: backups
              hostPath:
                path: /var/backups/daykeeper
                type: DirectoryOrCreate
            - name: tmp
              emptyDir: {}
