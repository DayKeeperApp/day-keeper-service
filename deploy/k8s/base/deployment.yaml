apiVersion: apps/v1
kind: Deployment
metadata:
  name: daykeeper-api
  namespace: daykeeper
  labels:
    app.kubernetes.io/name: daykeeper-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daykeeper-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daykeeper-api
    spec:
      initContainers:
        - name: migrate
          image: daykeeper-api:latest
          imagePullPolicy: Never
          command: ["/app/efbundle"]
          args: ["--connection", "$(ConnectionStrings__DefaultConnection)"]
          envFrom:
            - secretRef:
                name: daykeeper-api-secrets
      containers:
        - name: api
          image: daykeeper-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: daykeeper-api-config
            - secretRef:
                name: daykeeper-api-secrets
          volumeMounts:
            - name: attachments
              mountPath: /data/attachments
            - name: firebase-credentials
              mountPath: /etc/firebase
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: attachments
          persistentVolumeClaim:
            claimName: daykeeper-attachments
        - name: firebase-credentials
          secret:
            secretName: daykeeper-api-secrets
            items:
              - key: firebase-credentials.json
                path: credentials.json
