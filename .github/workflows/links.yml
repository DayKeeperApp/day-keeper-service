name: Link checker

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - "**.md"
      - "docs/**"

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --verbose --no-progress "**/*.md"
          fail: true
