name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: daykeeper_test
          POSTGRES_PASSWORD: daykeeper_test
          POSTGRES_DB: daykeeper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daykeeper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # yamllint disable-line rule:line-length
      TEST_CONNECTION_STRING: "Host=localhost;Port=5432;Database=daykeeper_test;Username=daykeeper_test;Password=daykeeper_test"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore DayKeeper.slnx --locked-mode

      - name: Build
        run: dotnet build DayKeeper.slnx --no-restore -c Release

      - name: Verify formatting
        run: dotnet format DayKeeper.slnx --verify-no-changes --verbosity diagnostic

      - name: Check vulnerable packages
        run: |
          OUTPUT=$(dotnet list DayKeeper.slnx package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Validate migrations
        run: >
          dotnet ef migrations script
          --project src/DayKeeper.Infrastructure/DayKeeper.Infrastructure.csproj
          --startup-project src/DayKeeper.Api/DayKeeper.Api.csproj
          --idempotent
          --no-build
          --configuration Release
          --output /dev/null

      - name: Apply migrations to test database
        run: >
          dotnet ef database update
          --project src/DayKeeper.Infrastructure/DayKeeper.Infrastructure.csproj
          --startup-project src/DayKeeper.Api/DayKeeper.Api.csproj
          --no-build
          --configuration Release
          --connection "$TEST_CONNECTION_STRING"

      - name: Test with coverage
        run: >
          dotnet test DayKeeper.slnx
          --no-build
          -c Release
          --collect:"XPlat Code Coverage"
          --settings tests/coverlet.runsettings
          --results-directory ./TestResults

      - name: Coverage report
        uses: k1LoW/octocov-action@73d561f65d59e66899ed5c87e4621a913b5d5c20 # v1
        if: success() || failure()

      - name: Push coverage badge
        if: github.ref == 'refs/heads/main' && success()
        run: |
          cp badges/coverage.svg /tmp/coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          if git fetch origin badges 2>/dev/null; then
            git checkout badges
          else
            git switch --orphan badges
          fi
          mkdir -p badges
          cp /tmp/coverage.svg badges/coverage.svg
          git add badges/coverage.svg
          git diff --cached --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push origin badges

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: actionlint
        uses: reviewdog/action-actionlint@0d952c597ef8459f634d7145b0b044a9699e5e43 # v1.71.0

      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
