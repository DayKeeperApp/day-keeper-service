name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: daykeeper_test
          POSTGRES_PASSWORD: daykeeper_test
          POSTGRES_DB: daykeeper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daykeeper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # yamllint disable-line rule:line-length
      TEST_CONNECTION_STRING: "Host=localhost;Port=5432;Database=daykeeper_test;Username=daykeeper_test;Password=daykeeper_test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore DayKeeper.slnx --locked-mode

      - name: Build
        run: dotnet build DayKeeper.slnx --no-restore -c Release

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Validate migrations
        run: >
          dotnet ef migrations script
          --project src/DayKeeper.Infrastructure/DayKeeper.Infrastructure.csproj
          --startup-project src/DayKeeper.Api/DayKeeper.Api.csproj
          --idempotent
          --no-build
          --configuration Release
          --output /dev/null

      - name: Apply migrations to test database
        run: >
          dotnet ef database update
          --project src/DayKeeper.Infrastructure/DayKeeper.Infrastructure.csproj
          --startup-project src/DayKeeper.Api/DayKeeper.Api.csproj
          --no-build
          --configuration Release
          --connection "$TEST_CONNECTION_STRING"

      - name: Test with coverage
        run: >
          dotnet test DayKeeper.slnx
          --no-build
          -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Coverage report
        uses: k1LoW/octocov-action@v1
        if: success() || failure()

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
