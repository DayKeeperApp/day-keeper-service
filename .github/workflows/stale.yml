name: Stale

on:
  schedule:
    - cron: "30 4 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,blocked
          exempt-pr-labels: pinned,security,blocked
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 7 days if no further
            activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 7 days if no
            further activity occurs.
