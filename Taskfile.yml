version: "3"

vars:
  SLN: DayKeeper.slnx
  API_PROJECT: src/DayKeeper.Api/DayKeeper.Api.csproj
  INFRA_PROJECT: src/DayKeeper.Infrastructure/DayKeeper.Infrastructure.csproj
  DOCKER_IMAGE: daykeeper-api
  K3D_CLUSTER: daykeeper
  EMULATOR_PROJECT: src/DayKeeper.UserEmulator/DayKeeper.UserEmulator.csproj

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - |
        B="\033[1m"
        D="\033[2m"
        R="\033[0m"
        C="\033[36m"
        HR="─────────────────────────────────────────────────────────────────────────────"
        echo ""
        echo -e "  ${D}╭${HR}╮${R}"
        echo -e "  ${D}│${R}  ${B}📦 DayKeeper Service${R}$(printf '%55s')${D}│${R}"
        echo -e "  ${D}╰${HR}╯${R}"
        echo ""
        echo -e "  ${B}${C}🔨 Build${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}restore${R}                    Restore NuGet packages"
        echo -e "    ${B}build${R}                      Build the solution (Debug)"
        echo -e "    ${B}build:release${R}              Build the solution (Release)"
        echo -e "    ${B}publish${R}                    Publish the API project (Release)"
        echo -e "    ${B}clean${R}                      Clean build outputs and test results"
        echo ""
        echo -e "  ${B}${C}🏠 Local Dev${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}local:up${R}                   Start local stack (Postgres + Grafana LGTM)"
        echo -e "    ${B}local:status${R}               Show local stack status"
        echo -e "    ${B}local:down${R}                 Stop local stack and remove containers"
        echo ""
        echo -e "  ${B}${C}🚀 Run${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}run${R}                        Run the API locally"
        echo -e "    ${B}watch${R}                      Run the API with hot reload"
        echo ""
        echo -e "  ${B}${C}🧪 Test${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}test${R}                       Run all tests"
        echo -e "    ${B}test:unit${R}                  Run unit tests only"
        echo -e "    ${B}test:integration${R}           Run integration tests only"
        echo -e "    ${B}test:coverage${R}              Run tests with code coverage (Cobertura XML)"
        echo -e "    ${B}test:coverage:report${R}       Generate and open HTML coverage report"
        echo ""
        echo -e "  ${B}${C}✨ Code Quality${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}format${R}                     Auto-format all C# files"
        echo -e "    ${B}format:check${R}               Verify formatting without changes"
        echo -e "    ${B}lint${R}                       Run lefthook pre-commit checks"
        echo -e "    ${B}lint:all${R}                   Run lefthook pre-commit checks on all files"
        echo -e "    ${B}vuln${R}                       Check for vulnerable packages"
        echo -e "    ${B}outdated${R}                   List outdated packages"
        echo ""
        echo -e "  ${B}${C}📋 Schema${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}schema${R}                     Export all API schemas (OpenAPI + GraphQL)"
        echo -e "    ${B}schema:openapi${R}             Export OpenAPI v1 spec to docs/api/"
        echo -e "    ${B}schema:graphql${R}             Export GraphQL SDL to docs/api/"
        echo ""
        echo -e "  ${B}${C}🎭 Emulator${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}emulator${R}                   Run UserEmulator with custom args"
        echo -e "    ${B}emulator:light${R}             Run UserEmulator (Light profile)"
        echo -e "    ${B}emulator:medium${R}            Run UserEmulator (Medium profile)"
        echo -e "    ${B}emulator:heavy${R}             Run UserEmulator (Heavy profile)"
        echo ""
        echo -e "  ${B}${C}🐳 Docker${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}docker:build${R}               Build Docker image"
        echo -e "    ${B}docker:run${R}                 Run Docker container"
        echo ""
        echo -e "  ${B}${C}☸  Deploy${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}deploy:dev${R}                 Deploy to local k3d cluster (dev)"
        echo -e "    ${B}deploy:prod${R}                Deploy to local k3d cluster (prod)"
        echo -e "    ${B}deploy:status${R}              Show deployment status"
        echo -e "    ${B}deploy:logs${R}                Tail API logs"
        echo -e "    ${B}deploy:teardown${R}            Delete k3d cluster"
        echo -e "    ${B}deploy:db-backup${R}           Trigger an on-demand database backup"
        echo -e "    ${B}deploy:db-restore${R}          Restore database from backup (-- filename)"
        echo -e "    ${B}deploy:db-restore:latest${R}   Restore database from latest backup"
        echo ""
        echo -e "  ${B}${C}🗄️  Database${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}db:migrate:add${R}             Create a new migration (-- MigrationName)"
        echo -e "    ${B}db:migrate:apply${R}           Apply pending migrations"
        echo -e "    ${B}db:migrate:script${R}          Generate idempotent SQL migration script"
        echo -e "    ${B}db:migrate:bundle${R}          Create self-contained migration bundle"
        echo ""
        echo -e "  ${B}${C}⚙️  Setup${R}"
        echo -e "  ${D}${HR}${R}"
        echo -e "    ${B}setup${R}                      Set up local development environment"
        echo ""

  # ── Build ────────────────────────────────────────────

  restore:
    desc: Restore NuGet packages
    cmds:
      - dotnet restore {{.SLN}}

  build:
    desc: Build the solution (Debug)
    cmds:
      - dotnet build {{.SLN}} --verbosity quiet

  build:release:
    desc: Build the solution (Release)
    cmds:
      - dotnet build {{.SLN}} -c Release --verbosity quiet

  publish:
    desc: Publish the API project (Release)
    cmds:
      - dotnet publish {{.API_PROJECT}} -c Release --verbosity quiet

  clean:
    desc: Clean build outputs and test results
    cmds:
      - dotnet clean {{.SLN}} --verbosity quiet
      - rm -rf TestResults

  # ── Local Dev ───────────────────────────────────────

  local:up:
    desc: Start local stack (Postgres + Grafana LGTM) and apply migrations
    cmds:
      - docker compose up -d --wait
      - task: db:migrate:apply
      - |
        echo ""
        echo "Postgres   localhost:5432 (postgres/postgres)"
        echo "Grafana    http://localhost:3000 (admin/admin)"
        echo "OTLP gRPC  localhost:4317"
        echo ""
        echo "Run 'task run' to start the API."

  local:status:
    desc: Show local stack status
    cmds:
      - docker compose ps

  local:down:
    desc: Stop local stack and remove containers
    cmds:
      - docker compose down

  # ── Run ──────────────────────────────────────────────

  run:
    desc: Run the API locally
    cmds:
      - dotnet run --project {{.API_PROJECT}}

  watch:
    desc: Run the API with hot reload
    cmds:
      - dotnet watch run --project {{.API_PROJECT}}

  # ── Test ─────────────────────────────────────────────

  test:
    desc: Run all tests
    cmds:
      - dotnet test {{.SLN}} --verbosity quiet

  test:unit:
    desc: Run unit tests only
    cmds:
      - dotnet test {{.SLN}} --filter "FullyQualifiedName~DayKeeper.Api.Tests.Unit"
        --verbosity quiet

  test:integration:
    desc: Run integration tests only
    cmds:
      - dotnet test {{.SLN}} --filter "FullyQualifiedName~DayKeeper.Api.Tests.Integration"
        --verbosity quiet

  test:coverage:
    desc: Run tests with code coverage (Cobertura XML)
    cmds:
      - rm -rf ./TestResults
      - dotnet test {{.SLN}} --collect:"XPlat Code Coverage"
        --settings tests/coverlet.runsettings
        --results-directory ./TestResults --verbosity quiet

  test:coverage:report:
    desc: Generate and open HTML coverage report
    deps: [test:coverage]
    cmds:
      - dotnet reportgenerator
        -reports:"./TestResults/**/coverage.cobertura.xml"
        -targetdir:"./TestResults/Report"
        -reporttypes:Html
      - echo "Report at ./TestResults/Report/index.html"
      - >
        open ./TestResults/Report/index.html ||
        xdg-open ./TestResults/Report/index.html 2>/dev/null ||
        true

  # ── Code Quality ─────────────────────────────────────

  format:
    desc: Auto-format all C# files
    cmds:
      - dotnet format {{.SLN}} --verbosity quiet

  format:check:
    desc: Verify formatting without changes
    cmds:
      - dotnet format {{.SLN}} --verify-no-changes --verbosity quiet

  lint:
    desc: Run all lefthook pre-commit checks
    cmds:
      - lefthook run pre-commit

  lint:all:
    desc: Run lefthook pre-commit checks on all files
    cmds:
      - lefthook run pre-commit --all-files

  vuln:
    desc: Check for vulnerable packages
    cmds:
      - dotnet list {{.SLN}} package --vulnerable --include-transitive

  outdated:
    desc: List outdated packages
    cmds:
      - dotnet list {{.SLN}} package --outdated

  # ── Schema ──────────────────────────────────────────

  schema:
    desc: Export all API schemas (OpenAPI + GraphQL)
    cmds:
      - task: schema:openapi
      - task: schema:graphql

  schema:openapi:
    desc: Export OpenAPI v1 specification to docs/api/openapi-v1.json
    vars:
      OPENAPI_OUT: "{{.ROOT_DIR}}/docs/api"
      API_OBJ: src/DayKeeper.Api/obj
    cmds:
      - mkdir -p {{.OPENAPI_OUT}}
      - rm -f {{.API_OBJ}}/DayKeeper.Api.OpenApiFiles.cache
      - dotnet build {{.API_PROJECT}}
        /p:OpenApiGenerateDocumentsOnBuild=true
        "/p:OpenApiDocumentsDirectory={{.OPENAPI_OUT}}/"
        --verbosity quiet
      - |
        if [ ! -f "{{.OPENAPI_OUT}}/DayKeeper.Api.json" ]; then
          echo "ERROR: OpenAPI build did not produce {{.OPENAPI_OUT}}/DayKeeper.Api.json" >&2
          exit 1
        fi
      - mv "{{.OPENAPI_OUT}}/DayKeeper.Api.json" "{{.OPENAPI_OUT}}/openapi-v1.json"
      - echo "Exported docs/api/openapi-v1.json"

  schema:graphql:
    desc: Export GraphQL SDL schema to docs/api/schema.graphql
    cmds:
      - mkdir -p docs/api
      - dotnet test {{.SLN}}
        --filter "FullyQualifiedName~SchemaExportTests.ExportGraphQLSchema"
        --verbosity quiet
      - |
        if [ ! -f docs/api/schema.graphql ]; then
          echo "ERROR: Schema export test did not produce docs/api/schema.graphql" >&2
          exit 1
        fi
      - echo "Exported docs/api/schema.graphql"

  # ── Emulator ─────────────────────────────────────────

  emulator:
    desc: Run the UserEmulator with custom args
    cmds:
      - dotnet run --project {{.EMULATOR_PROJECT}} -- {{.CLI_ARGS}}

  emulator:light:
    desc: Run UserEmulator with Light profile
    cmds:
      - dotnet run --project {{.EMULATOR_PROJECT}} -- --profile Light

  emulator:medium:
    desc: Run UserEmulator with Medium profile
    cmds:
      - dotnet run --project {{.EMULATOR_PROJECT}} -- --profile Medium

  emulator:heavy:
    desc: Run UserEmulator with Heavy profile
    cmds:
      - dotnet run --project {{.EMULATOR_PROJECT}} -- --profile Heavy

  # ── Docker ───────────────────────────────────────────

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.DOCKER_IMAGE}} .

  docker:run:
    desc: Run Docker container
    deps: [docker:build]
    cmds:
      - docker run --env-file .env --network host {{.DOCKER_IMAGE}}

  # ── Database ────────────────────────────────────────────

  db:migrate:add:
    desc: "Create a new migration (usage: task db:migrate:add -- MigrationName)"
    requires:
      vars: [CLI_ARGS]
    cmds:
      - >
        dotnet ef migrations add {{.CLI_ARGS}}
        --project {{.INFRA_PROJECT}}
        --startup-project {{.API_PROJECT}}
        --output-dir Persistence/Migrations

  db:migrate:apply:
    desc: Apply pending migrations to the database
    cmds:
      - >
        dotnet ef database update
        --project {{.INFRA_PROJECT}}
        --startup-project {{.API_PROJECT}}

  db:migrate:script:
    desc: Generate idempotent SQL migration script
    cmds:
      - >
        dotnet ef migrations script
        --project {{.INFRA_PROJECT}}
        --startup-project {{.API_PROJECT}}
        --idempotent
        --output migrations.sql
      - echo "Script written to migrations.sql"

  db:migrate:bundle:
    desc: Create self-contained migration bundle for production
    cmds:
      - >
        dotnet ef migrations bundle
        --project {{.INFRA_PROJECT}}
        --startup-project {{.API_PROJECT}}
        --force
        --self-contained
      - echo "Bundle created at ./efbundle"

  # ── Deploy ───────────────────────────────────────────

  deploy:dev:
    desc: Deploy DayKeeper to local k3d cluster (dev)
    cmds:
      - task: deploy:cluster
      - task: docker:build
      - task: deploy:import
      - task: deploy:apply:dev

  deploy:prod:
    desc: Deploy DayKeeper to local k3d cluster (prod)
    cmds:
      - task: deploy:cluster
      - task: docker:build
      - task: deploy:import
      - task: deploy:apply:prod

  deploy:cluster:
    desc: Create k3d cluster if it doesn't exist
    internal: true
    status:
      - k3d cluster list | grep -q {{.K3D_CLUSTER}}
    cmds:
      - k3d cluster create {{.K3D_CLUSTER}}
        --port "8080:8080@loadbalancer"
        --volume "/var/backups/daykeeper:/var/backups/daykeeper"
        --wait

  deploy:import:
    desc: Import Docker image into k3d cluster
    internal: true
    cmds:
      - k3d image import {{.DOCKER_IMAGE}}:latest
        --cluster {{.K3D_CLUSTER}}

  deploy:apply:dev:
    desc: Apply dev Kubernetes manifests
    internal: true
    cmds:
      - kubectl apply -k deploy/k8s/overlays/dev/
      - kubectl -n daykeeper rollout status statefulset/postgres --timeout=120s
      - kubectl -n daykeeper rollout status deployment/daykeeper-api --timeout=180s

  deploy:apply:prod:
    desc: Apply prod Kubernetes manifests
    internal: true
    cmds:
      - kubectl apply -k deploy/k8s/overlays/prod/
      - kubectl -n daykeeper rollout status statefulset/postgres --timeout=120s
      - kubectl -n daykeeper rollout status deployment/daykeeper-api --timeout=180s

  deploy:status:
    desc: Show status of DayKeeper deployment
    cmds:
      - kubectl -n daykeeper get all

  deploy:logs:
    desc: Tail DayKeeper API logs
    cmds:
      - kubectl -n daykeeper logs -f deployment/daykeeper-api

  deploy:teardown:
    desc: Delete k3d cluster
    cmds:
      - k3d cluster delete {{.K3D_CLUSTER}}

  deploy:db-backup:
    desc: Trigger an on-demand database backup
    cmds:
      - kubectl create job postgres-backup-manual --from=cronjob/postgres-backup -n daykeeper
      - kubectl -n daykeeper wait --for=condition=complete job/postgres-backup-manual --timeout=300s
      - kubectl -n daykeeper logs job/postgres-backup-manual
      - kubectl delete job postgres-backup-manual -n daykeeper

  deploy:db-restore:
    desc: "Restore database from backup (usage: task deploy:db-restore -- filename.dump)"
    cmds:
      - |
        BACKUP_FILE="{{.CLI_ARGS}}"
        JOB_YAML="deploy/k8s/base/jobs/backup-restore-job.yaml"
        if [ -z "$BACKUP_FILE" ]; then
          BACKUP_FILE=$(./deploy/scripts/select-backup.sh) || exit 0
        fi
        kubectl delete job postgres-restore -n daykeeper --ignore-not-found > /dev/null 2>&1
        sed "s/__BACKUP_FILE__/$BACKUP_FILE/" "$JOB_YAML" | kubectl apply -f - > /dev/null
        kubectl -n daykeeper wait --for=condition=complete job/postgres-restore --timeout=300s
        kubectl -n daykeeper logs job/postgres-restore
        kubectl delete job postgres-restore -n daykeeper --ignore-not-found > /dev/null 2>&1

  deploy:db-restore:latest:
    desc: Restore database from the latest backup
    cmds:
      - |
        JOB_YAML="deploy/k8s/base/jobs/backup-restore-job.yaml"
        kubectl delete job postgres-restore -n daykeeper --ignore-not-found > /dev/null 2>&1
        sed 's/__BACKUP_FILE__/__LATEST__/' "$JOB_YAML" | kubectl apply -f -
        kubectl -n daykeeper wait --for=condition=complete job/postgres-restore --timeout=300s
        kubectl -n daykeeper logs job/postgres-restore
        kubectl delete job postgres-restore -n daykeeper --ignore-not-found > /dev/null 2>&1

  # ── Setup ────────────────────────────────────────────

  setup:
    desc: Set up local development environment
    cmds:
      - task: restore
      - dotnet tool restore
      - lefthook install
      - go install github.com/zegl/kube-score/cmd/kube-score@latest
      - echo "Done! Run 'task run' to start the API."
