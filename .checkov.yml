framework: kubernetes
directory: deploy/k8s/
compact: true
quiet: true
skip-check:
  # k3d local dev requires locally-imported images with imagePullPolicy: Never
  - CKV_K8S_14 # Image Tag should be fixed - not latest or blank
  - CKV_K8S_15 # Image Pull Policy should be Always
  - CKV_K8S_43 # Image should use digest
  # postgres-alpine image hardcodes UID 70
  - CKV_K8S_40 # Containers should run as a high UID to avoid host conflict
  # Postgres official image requires env vars; .NET IConfiguration reads env vars by design
  - CKV_K8S_35 # Prefer using secrets as files over secrets as environment variables
  # Backup/restore init container needs CHOWN to fix hostPath ownership for postgres UID 70
  - CKV_K8S_25 # Minimize the admission of containers with added capability
